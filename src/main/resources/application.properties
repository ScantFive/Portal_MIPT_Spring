# Spring Boot Application Configuration

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Application Name
spring.application.name=Portal MIPT Spring Boot

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portal_DB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:JavaMTS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Topics Configuration
kafka.topic.advertisement-events=${KAFKA_TOPIC_ADVERTISEMENT_EVENTS:advertisement-events}
kafka.topic.user-events=${KAFKA_TOPIC_USER_EVENTS:user-events}
kafka.topic.chat-events=${KAFKA_TOPIC_CHAT_EVENTS:chat-events}
kafka.topic.favorite-events=${KAFKA_TOPIC_FAVORITE_EVENTS:favorite-events}
kafka.topic.search-history-events=${KAFKA_TOPIC_SEARCH_HISTORY_EVENTS:search-history-events}
kafka.topic.wallet-events=${KAFKA_TOPIC_WALLET_EVENTS:wallet-events}
kafka.topic.mainpage-events=${KAFKA_TOPIC_MAINPAGE_EVENTS:mainpage-events}
kafka.topic.review-events=${KAFKA_TOPIC_REVIEW_EVENTS:review-events}

# Logging Configuration
logging.level.root=INFO
logging.level.com.mipt=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.kafka=DEBUG

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Encoding
spring.mandatory-file-encoding=UTF-8
server.tomcat.uri-encoding=UTF-8
