spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/portal_DB
    username: postgres
    password: JavaMTS
    driver-class-name: org.postgresql.Driver

  jpa:
    database: POSTGRESQL
    show-sql: true  # Показывать SQL для отладки
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: false  # НЕ create! Используем существующую схему
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: event:com.mipt.event.AdvertisementEvent
    consumer:
      group-id: advertisement-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: event:com.mipt.advertisement.event.AdvertisementEvent
      auto-offset-reset: earliest

server:
  port: 8080

logging:
  level:
    com.mipt.advertisement: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.web: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.transaction: DEBUG

kafka:
  topic:
    advertisement-events: advertisement-events